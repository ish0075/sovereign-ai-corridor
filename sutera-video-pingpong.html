<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGN AI CORRIDOR — Video Loop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #F5F5F0;
            --bg-secondary: #E8E8E0;
            --text-primary: #1A1A1A;
            --text-secondary: #666666;
            --accent-cyan: #00D9FF;
            --border: #1A1A1A;
            --grid-line: rgba(26,26,26,0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* Grid Overlay */
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 100px 100px;
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            mix-blend-mode: difference;
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: white;
        }

        .header-center {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .change-reality-btn {
            padding: 12px 24px;
            border: 1px solid white;
            background: transparent;
            color: white;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .change-reality-btn:hover {
            background: white;
            color: black;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 32px;
            color: white;
        }

        .time-display {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.05em;
        }

        .menu-trigger {
            width: 32px;
            height: 32px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
        }

        .menu-trigger span {
            display: block;
            width: 100%;
            height: 1px;
            background: white;
        }

        /* FULL SCREEN VIDEO SECTION */
        .video-section {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: var(--bg-primary);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #hero-video {
            max-width: 90%;
            max-height: 80vh;
            width: auto;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 30px 60px rgba(0,0,0,0.5));
            display: block;
            pointer-events: none;
        }

        /* Typewriter Text Overlay */
        .text-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 20;
        }

        .typewriter-box {
            position: absolute;
            background: rgba(245,245,240,0.9);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px 20px;
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .typewriter-box.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .typewriter-box h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--accent-cyan);
            margin-bottom: 6px;
            letter-spacing: 0.02em;
        }

        .typewriter-box p {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin: 0;
        }

        .typewriter-cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: var(--accent-cyan);
            margin-left: 2px;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* Text Positions */
        .pos-top-left { top: 100px; left: 40px; max-width: 320px; }
        .pos-middle-right { top: 50%; right: 40px; transform: translateY(-50%); text-align: right; }
        .pos-middle-right.visible { transform: translateY(-50%) translateY(0); }
        .pos-lower-left { bottom: 150px; left: 40px; max-width: 300px; }
        .pos-bottom-right { bottom: 150px; right: 40px; text-align: right; }
        .pos-bottom-center {
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            background: transparent;
            border: none;
            backdrop-filter: none;
        }
        .pos-bottom-center.visible {
            transform: translateX(-50%) translateY(0);
        }

        .bottom-info-card {
            background: rgba(245,245,240,0.9);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 18px;
            min-width: 200px;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .bottom-info-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .bottom-info-card h4 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: var(--accent-cyan);
            margin-bottom: 4px;
        }

        .bottom-info-card p {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: var(--text-secondary);
            margin: 0;
        }

        /* Counter Animation */
        .counter-box {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 48px;
            font-weight: 700;
            color: var(--accent-cyan);
        }

        .counter-box .arrow {
            color: #666;
            margin: 0 8px;
        }

        /* Floating particles */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--accent-cyan);
            border-radius: 50%;
            opacity: 0.6;
            animation: particle-float 4s ease-in-out infinite;
        }

        @keyframes particle-float {
            0%, 100% {
                transform: translateY(0) translateX(0);
                opacity: 0.3;
            }
            50% {
                transform: translateY(-30px) translateX(10px);
                opacity: 0.8;
            }
        }

        /* Status indicator */
        .playback-status {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--accent-cyan);
            background: rgba(245,245,240,0.9);
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 4px;
            z-index: 40;
        }

        /* Grid cross markers */
        .grid-plus {
            position: fixed;
            width: 12px;
            height: 12px;
            pointer-events: none;
            z-index: 2;
        }

        .grid-plus::before,
        .grid-plus::after {
            content: '';
            position: absolute;
            background: var(--text-primary);
            opacity: 0.3;
        }

        .grid-plus::before {
            width: 1px;
            height: 100%;
            left: 50%;
            transform: translateX(-50%);
        }

        .grid-plus::after {
            width: 100%;
            height: 1px;
            top: 50%;
            transform: translateY(-50%);
        }

        @media (max-width: 1024px) {
            .typewriter-box {
                padding: 12px 16px;
            }
            .typewriter-box h3 {
                font-size: 14px;
            }
            .typewriter-box p {
                font-size: 10px;
            }
            .pos-top-left { top: 80px; left: 20px; max-width: 260px; }
            .pos-middle-right { right: 20px; }
            .pos-lower-left { bottom: 120px; left: 20px; max-width: 240px; }
            .pos-bottom-right { bottom: 120px; right: 20px; }
            .pos-bottom-center {
                flex-direction: column;
                gap: 10px;
                bottom: 20px;
            }
            .bottom-info-card {
                min-width: auto;
                padding: 10px 14px;
            }
        }

        @media (max-width: 768px) {
            .typewriter-box {
                display: none;
            }
            .bottom-info-card h4 {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Grid Overlay -->
    <div class="grid-overlay"></div>

    <!-- Header -->
    <header>
        <div class="logo">SOVEREIGN AI CORRIDOR</div>
        <div class="header-center">
            <button class="change-reality-btn">Change Reality</button>
        </div>
        <div class="header-right">
            <span class="time-display" id="local-time">Toronto — 10:30 AM</span>
            <div class="menu-trigger">
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <!-- Full Screen Video Section -->
    <section class="video-section">
        <!-- Gradient overlays -->
        <div class="gradient-overlay"></div>

        <!-- Floating Particles -->
        <div class="particles">
            <div class="particle" style="top: 20%; left: 30%; animation-delay: 0s;"></div>
            <div class="particle" style="top: 30%; left: 70%; animation-delay: 0.5s;"></div>
            <div class="particle" style="top: 50%; left: 20%; animation-delay: 1s;"></div>
            <div class="particle" style="top: 60%; left: 80%; animation-delay: 1.5s;"></div>
            <div class="particle" style="top: 40%; left: 50%; animation-delay: 2s;"></div>
            <div class="particle" style="top: 70%; left: 40%; animation-delay: 2.5s;"></div>
        </div>

        <!-- Video Container - CENTERED -->
        <div class="video-container">
            <video id="hero-video" muted playsinline preload="auto">
                <source src="sutera-rotation-video.mp4" type="video/mp4">
            </video>
        </div>

        <!-- Typewriter Text Overlays -->
        <div class="text-overlay">
            <!-- Top Left - Crown Foundation -->
            <div class="typewriter-box pos-top-left" id="text-crown">
                <h3></h3>
                <p></p>
            </div>

            <!-- Middle Right - 0 → 8 Counter -->
            <div class="typewriter-box pos-middle-right" id="text-counter">
                <div class="counter-box">
                    <span id="counter-from">0</span>
                    <span class="arrow">→</span>
                    <span id="counter-to">8</span>
                </div>
            </div>

            <!-- Lower Left - 545+ Acres -->
            <div class="typewriter-box pos-lower-left" id="text-acres">
                <h3></h3>
                <p></p>
            </div>

            <!-- Bottom Right - 0 → 8 -->
            <div class="typewriter-box pos-bottom-right" id="text-counter-2">
                <div class="counter-box">
                    <span id="counter-from-2">0</span>
                    <span class="arrow">→</span>
                    <span id="counter-to-2">8</span>
                </div>
            </div>

            <!-- Bottom Center - Grid/Cooling Info -->
            <div class="pos-bottom-center" id="text-bottom-info">
                <div class="bottom-info-card" id="card-grid">
                    <h4></h4>
                    <p></p>
                </div>
                <div class="bottom-info-card" id="card-cooling">
                    <h4></h4>
                    <p></p>
                </div>
                <div class="bottom-info-card" id="card-crown">
                    <h4></h4>
                    <p></p>
                </div>
            </div>
        </div>

        <!-- Playback Status -->
        <div class="playback-status" id="playback-status">Loading...</div>
    </section>

    <script>
        // Update time
        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('en-US', {
                timeZone: 'America/Toronto',
                hour: '2-digit',
                minute: '2-digit'
            });
            document.getElementById('local-time').textContent = `Toronto — ${timeString}`;
        }
        updateTime();
        setInterval(updateTime, 60000);

        // Typewriter Effect
        function typeWriter(element, text, speed = 40) {
            return new Promise((resolve) => {
                let i = 0;
                element.innerHTML = '';
                const cursor = document.createElement('span');
                cursor.className = 'typewriter-cursor';
                
                function type() {
                    if (i < text.length) {
                        element.textContent = text.substring(0, i + 1);
                        element.appendChild(cursor);
                        i++;
                        setTimeout(type, speed);
                    } else {
                        element.textContent = text;
                        // Keep cursor blinking for a moment then remove
                        setTimeout(() => {
                            resolve();
                        }, 500);
                    }
                }
                type();
            });
        }

        // Number counter animation
        function animateNumber(element, from, to, duration = 800) {
            return new Promise((resolve) => {
                const startTime = performance.now();
                function update(currentTime) {
                    const elapsed = currentTime - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    const easeOut = 1 - Math.pow(1 - progress, 4);
                    const current = Math.round(from + (to - from) * easeOut);
                    element.textContent = current;
                    if (progress < 1) {
                        requestAnimationFrame(update);
                    } else {
                        resolve();
                    }
                }
                requestAnimationFrame(update);
            });
        }

        // Text content
        const textContent = {
            crown: {
                title: 'Crown Foundation',
                desc: 'Federal & Provincial Crown land — 545+ acres sovereign-controlled.'
            },
            acres: {
                title: '545+ Acres',
                desc: 'Allanburg & Nanticoke nodes. Canada\'s sovereign AI corridor.'
            },
            grid: {
                title: '500kV / 230kV Grid',
                desc: 'Direct-tap easements. Grid-locked interconnection ready.'
            },
            cooling: {
                title: 'Cooling Superhighway',
                desc: 'St. Lawrence + Lake Erie cooling. PUE < 1.1'
            }
        };

        // Ping-Pong Video Loop: 0 → 8 → 0 → 8 → 0 → 8...
        const video = document.getElementById('hero-video');
        const statusIndicator = document.getElementById('playback-status');
        
        let direction = 1; // 1 = forward (0→8), -1 = reverse (8→0)
        let isLooping = false;
        let animationId = null;
        const videoDuration = 8; // 8 seconds
        const fps = 30;
        const frameStep = 1 / fps;
        let lastFrameTime = 0;
        let animationPhase = 0;
        let textAnimated = false; // Track if text has been animated this forward cycle

        // Initialize text animations based on video progress (only during forward play)
        async function updateTextAnimations() {
            // Only animate text during forward direction (0→8)
            if (direction !== 1 || textAnimated) return;
            
            const progress = video.currentTime;
            const pct = (progress / videoDuration) * 100;
            
            // Phase 1: 0-15% - Crown Foundation
            if (pct >= 0 && pct < 15 && animationPhase < 1) {
                animationPhase = 1;
                const box = document.getElementById('text-crown');
                box.classList.add('visible');
                await typeWriter(box.querySelector('h3'), textContent.crown.title, 50);
                await typeWriter(box.querySelector('p'), textContent.crown.desc, 30);
            }
            
            // Phase 2: 15-35% - 0 → 8 counter (middle right)
            if (pct >= 15 && pct < 35 && animationPhase < 2) {
                animationPhase = 2;
                const box = document.getElementById('text-counter');
                box.classList.add('visible');
                const fromEl = document.getElementById('counter-from');
                const toEl = document.getElementById('counter-to');
                animateNumber(fromEl, 0, 0, 200);
                await animateNumber(toEl, 0, 8, 800);
            }
            
            // Phase 3: 35-60% - 545+ Acres
            if (pct >= 35 && pct < 60 && animationPhase < 3) {
                animationPhase = 3;
                const box = document.getElementById('text-acres');
                box.classList.add('visible');
                await typeWriter(box.querySelector('h3'), textContent.acres.title, 60);
                await typeWriter(box.querySelector('p'), textContent.acres.desc, 35);
            }
            
            // Phase 4: 60-85% - 0 → 8 counter (bottom right)
            if (pct >= 60 && pct < 85 && animationPhase < 4) {
                animationPhase = 4;
                const box = document.getElementById('text-counter-2');
                box.classList.add('visible');
                const fromEl = document.getElementById('counter-from-2');
                const toEl = document.getElementById('counter-to-2');
                animateNumber(fromEl, 0, 0, 200);
                await animateNumber(toEl, 0, 8, 800);
            }
            
            // Phase 5: 85%+ - Bottom info cards
            if (pct >= 85 && animationPhase < 5) {
                animationPhase = 5;
                textAnimated = true; // Mark as completed for this forward cycle
                const container = document.getElementById('text-bottom-info');
                container.classList.add('visible');
                
                const gridCard = document.getElementById('card-grid');
                const coolingCard = document.getElementById('card-cooling');
                const crownCard = document.getElementById('card-crown');
                
                // Staggered appearance
                setTimeout(() => {
                    gridCard.classList.add('visible');
                    typeWriter(gridCard.querySelector('h4'), textContent.grid.title, 40);
                    typeWriter(gridCard.querySelector('p'), textContent.grid.desc, 25);
                }, 0);
                
                setTimeout(() => {
                    coolingCard.classList.add('visible');
                    typeWriter(coolingCard.querySelector('h4'), textContent.cooling.title, 40);
                    typeWriter(coolingCard.querySelector('p'), textContent.cooling.desc, 25);
                }, 400);
                
                setTimeout(() => {
                    crownCard.classList.add('visible');
                    typeWriter(crownCard.querySelector('h4'), textContent.crown.title, 40);
                    typeWriter(crownCard.querySelector('p'), textContent.crown.desc, 25);
                }, 800);
            }
        }

        // Hide all text boxes
        function hideAllText() {
            document.querySelectorAll('.typewriter-box').forEach(el => {
                el.classList.remove('visible');
                // Clear content for re-animation
                if (!el.id.includes('counter')) {
                    const h3 = el.querySelector('h3');
                    const p = el.querySelector('p');
                    if (h3) h3.textContent = '';
                    if (p) p.textContent = '';
                }
            });
            document.querySelectorAll('.bottom-info-card').forEach(el => {
                el.classList.remove('visible');
                const h4 = el.querySelector('h4');
                const p = el.querySelector('p');
                if (h4) h4.textContent = '';
                if (p) p.textContent = '';
            });
            document.getElementById('text-bottom-info').classList.remove('visible');
        }

        function initVideo() {
            video.pause();
            video.currentTime = 0;
            console.log('Video initialized, duration:', video.duration);
            statusIndicator.textContent = '0 → 8';
            startPingPongLoop();
        }

        if (video.readyState >= 2) {
            initVideo();
        } else {
            video.addEventListener('loadeddata', initVideo);
            video.addEventListener('canplay', initVideo);
        }

        function startPingPongLoop() {
            if (isLooping) return;
            isLooping = true;
            direction = 1;
            video.currentTime = 0;
            lastFrameTime = performance.now();
            requestAnimationFrame(playLoop);
        }

        function playLoop(currentTime) {
            if (!isLooping) return;
            
            const deltaTime = (currentTime - lastFrameTime) / 1000;
            lastFrameTime = currentTime;
            
            if (deltaTime >= frameStep) {
                if (direction === 1) {
                    // FORWARD: 0 → 8
                    video.currentTime += frameStep;
                    
                    // Update text animations during forward play
                    updateTextAnimations();
                    
                    // Check if reached end (8 seconds)
                    if (video.currentTime >= videoDuration) {
                        video.currentTime = videoDuration;
                        direction = -1; // Switch to reverse
                        statusIndicator.textContent = '8 → 0';
                    }
                } else {
                    // REVERSE: 8 → 0
                    video.currentTime -= frameStep;
                    
                    // Check if reached start (0 seconds)
                    if (video.currentTime <= 0) {
                        video.currentTime = 0;
                        direction = 1; // Switch to forward
                        statusIndicator.textContent = '0 → 8';
                        
                        // Reset for next cycle
                        animationPhase = 0;
                        textAnimated = false;
                        hideAllText();
                    }
                }
            }

            animationId = requestAnimationFrame(playLoop);
        }

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
            } else {
                if (!animationId && isLooping) {
                    lastFrameTime = performance.now();
                    animationId = requestAnimationFrame(playLoop);
                }
            }
        });

        video.addEventListener('error', (e) => {
            console.error('Video error:', e);
            statusIndicator.textContent = 'Error loading video';
        });
    </script>
</body>
</html>
